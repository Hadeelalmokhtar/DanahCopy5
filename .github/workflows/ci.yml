name: SSC Build Pipeline

on:
  push:
    branches: ["main"]
    paths:
      - "*.tgz"
      - "*.tar.gz"

  workflow_dispatch:
    inputs:
      package_file:
        description: "Enter package file name, e.g. animejs-3.2.1.tgz"
        required: true
        default: "animejs-3.2.1.tgz"

permissions:
  contents: write
  actions: read

jobs:
  build-test:
    runs-on: ubuntu-latest

    env:
      BUILD_ARTIFACT_BUCKET: https://ssc-collector.onrender.com/s3/prod-build-artifacts-2026
      VIRUSTOTAL_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install yara-python semgrep
          

      - name: Download NLTK Data
        run: |
          python -c "import nltk; nltk.download('stopwords')"

      - name: Detect Package
        id: detect_pkg
        run: |
          PACKAGE=""

          echo "Trigger type: ${{ github.event_name }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PACKAGE="${{ github.event.inputs.package_file }}"
            if [ ! -f "$PACKAGE" ]; then
              echo "Package $PACKAGE not found in root"
              echo "skip_pipeline=true" >> $GITHUB_OUTPUT
              echo "package_path=" >> $GITHUB_OUTPUT
              echo "package_name=" >> $GITHUB_OUTPUT
              exit 0
            fi
          else
            BEFORE="${{ github.event.before }}"
            SHA="${{ github.sha }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              BEFORE=$(git hash-object -t tree /dev/null)
            fi
            FILES=$(git diff --name-only "$BEFORE" "$SHA" 2>/dev/null || true)
            for f in $FILES; do
              if [[ "$f" == *.tgz ]] || [[ "$f" == *.tar.gz ]]; then
                if [[ "$f" != */* ]] && [ -f "$f" ]; then
                  PACKAGE="$f"
                  break
                fi
              fi
            done
          fi

          if [ -z "$PACKAGE" ]; then
            echo "No new package detected in this commit → skipping pipeline"
            echo "skip_pipeline=true" >> $GITHUB_OUTPUT
            echo "package_path=" >> $GITHUB_OUTPUT
            echo "package_name=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Package detected: $PACKAGE"
          PKG_NAME=$(basename "$PACKAGE")
          echo "skip_pipeline=false" >> $GITHUB_OUTPUT
          echo "package_path=$PACKAGE" >> $GITHUB_OUTPUT
          echo "package_name=$PKG_NAME" >> $GITHUB_OUTPUT

     
    
      
      # =========================
      # SANDBOX — ALL PACKAGES
      # =========================
      - name: Build Sandbox Image
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        run: |
          docker build -t ssc-sandbox -f sandbox/Dockerfile .

      - name: Run Dynamic Analysis
        run: |
          # Start container in background
          docker run --privileged \
            --name ssc-sandbox-run \
            -e VIRUSTOTAL_API_KEY="$VIRUSTOTAL_API_KEY" \
            -e GH_RUN_NUMBER="${{ github.run_number }}" \
            -v "${{ github.workspace }}:/app" \
            ssc-sandbox \
            python sandbox/runner.py "${{ steps.detect_pkg.outputs.package_path }}"

         
          docker rm ssc-sandbox-run || true
          sudo chmod -R 777 decoy_logs/ || true
          sudo chmod -R 777 CTI_Storage/ || true
          
      # =========================
      # AWS EC2 eBPF ANALYSIS
      # =========================
      - name: Signal AWS EC2 for eBPF Analysis
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Clean up any old pending file first
          git rm -f .ebpf_pending 2>/dev/null || true

          # Write package name to trigger file
          echo "${{ steps.detect_pkg.outputs.package_name }}:${{ github.run_number }}" > .ebpf_pending
          rm -f decoy_logs/ebpf_done_${{ steps.detect_pkg.outputs.package_name }}.flag || true
          git add .ebpf_pending
          git add decoy_logs/ || true
          git add CTI_Storage/ || true
          git commit -m "eBPF analysis requested: ${{ steps.detect_pkg.outputs.package_name }}"
          git push origin main
          
      - name: Wait for AWS EC2 eBPF Results
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        continue-on-error: true
        run: |
          PKG_NAME="${{ steps.detect_pkg.outputs.package_name }}"
          PKG_STEM="${PKG_NAME%.tgz}"
          PKG_STEM="${PKG_STEM%.tar.gz}"
          RUN_NUM="${{ github.run_number }}"
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          EBPF_RECEIVED=false
          for i in $(seq 1 30); do
            echo "Attempt $i/30 — checking EC2..."
            if ssh -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no ubuntu@35.172.190.4 \
              "test -f /home/ubuntu/DanahCopy5/decoy_logs/decoy_runs/${PKG_STEM}_run${RUN_NUM}_ebpf.json"; then
              scp -i ~/.ssh/ec2_key.pem -o StrictHostKeyChecking=no \
                ubuntu@35.172.190.4:/home/ubuntu/DanahCopy5/decoy_logs/decoy_runs/${PKG_STEM}_run${RUN_NUM}_ebpf.json \
                decoy_logs/decoy_runs/${PKG_STEM}_run${RUN_NUM}_ebpf.json
              echo "eBPF results received ✅"
              EBPF_RECEIVED=true
              break
            fi
            echo "Not ready yet — waiting 10 seconds..."
            sleep 10
          done
          git rm -f .ebpf_pending 2>/dev/null || true
          if [ "$EBPF_RECEIVED" = "false" ]; then
            echo "⚠️ WARNING: eBPF results not received — continuing without"
          fi
    
      # =========================
      # ML GATE + YARA + SEMGREP — ALL PACKAGES
      # =========================
      - name: ML Security Gate
        id: ml_scan
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        continue-on-error: true
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          RESULT=0
          python -m scripts.run_analysis "${{ steps.detect_pkg.outputs.package_path }}" || RESULT=$?
          echo "ML_EXIT_CODE=$RESULT"
          echo "ml_result=$RESULT" >> $GITHUB_OUTPUT

      # =========================
      # CTI FEATURE EXTRACTION
      # =========================
      - name: Extract Decoy CTI Features
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        continue-on-error: true
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          sudo chmod -R 777 decoy_logs/ || true
          sudo chmod -R 777 CTI_Storage/ || true
          python scripts/extract_decoy_features.py || echo "extract_decoy_features.py not found - skipping"

      # =========================
      # RELEASE LOGIC — ML DECIDES
      # =========================
      - name: Release Package
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        run: |
          if [ "${{ steps.ml_scan.outputs.ml_result }}" = "0" ]; then
            echo "ML says CLEAN → releasing"
            mkdir -p packages/releases
            mv "${{ steps.detect_pkg.outputs.package_path }}" \
              "packages/releases/${{ steps.detect_pkg.outputs.package_name }}" || true
          else
            echo "ML says MALICIOUS → blocking"
            mkdir -p packages/blocked
            mv "${{ steps.detect_pkg.outputs.package_path }}" \
              "packages/blocked/${{ steps.detect_pkg.outputs.package_name }}" 2>/dev/null || true
          fi

      # =========================
      # MERGE CTI DATASET
      # =========================
      - name: Merge CTI Dataset
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        continue-on-error: true
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          sudo chmod -R 777 decoy_logs/ || true
          sudo chmod -R 777 CTI_Storage/ || true
          python cti_merger/cti_merger.py || echo "cti_merger.py not found - skipping"

      # =========================
      # COMMIT — with conflict handling
      # =========================
      - name: Commit Results
        if: steps.detect_pkg.outputs.skip_pipeline == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add packages/ || true
          git add decoy_logs/ || true
          git add CTI_Storage/ || true

          git commit -m "SSC pipeline result (run ${{ github.run_number }})" || echo "Nothing to commit"

          for i in 1 2 3 4 5; do
            git pull --rebase --autostash origin main && break || {
              echo "Rebase conflict on attempt $i — resolving..."
              git checkout --theirs CTI_Storage/enriched_cti_dataset.csv 2>/dev/null || true
              git checkout --theirs CTI_Storage/processed_runs.json 2>/dev/null || true
              git checkout --theirs decoy_logs/latest.json 2>/dev/null || true
              git checkout --theirs decoy_logs/ 2>/dev/null || true
              git add CTI_Storage/ decoy_logs/ || true
              git rebase --continue 2>/dev/null || git rebase --skip || true
              sleep 3
            }
          done

          git push origin main || git push --force-with-lease origin main
